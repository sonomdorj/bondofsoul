The race<\u002Fdiv>\n      <p data-blur=\"0.2\" style=\"font-size:clamp(1.15rem,1.6vw,1.5rem); font-style:italic; color:#d8c396; margin:.7rem auto 0; max-width:36em; text-shadow:0 1px 8px rgba(0,0,0,.6);\">1975. The night before Naadam, the bay mare Sogoo Kheer eats dirt — a horse in peak form, in danger of going down on the course. To protect Tsevelmaa, the girl set to ride her, young Balgaa pulls her from the saddle and rides the race himself. Far ahead of the field, within sight of the Naadam grounds, horse and boy come crashing down.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ QUOTE INTERSTITIAL ============ -->\n  <section data-screen-label=\"Quote\" data-zoomquote=\"1\" style=\"position:relative; height:180vh;\">\n    <div style=\"position:sticky; top:0; height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden;\">\n      <div data-zoomquote-inner=\"1\" style=\"text-align:center; padding:0 clamp(24px,8vw,120px); will-change:transform,opacity,filter;\">\n        <div style=\"font-size:clamp(2rem,4.5vw,4.2rem); font-style:italic; line-height:1.25; color:#efdcb4; max-width:18em;\">Who has the right to love a child?<\u002Fdiv>\n        <div style=\"margin-top:24px; width:64px; height:1px; background:#b3242c; display:inline-block;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CHARACTERS ============ -->\n  <section data-screen-label=\"Characters\" style=\"padding:clamp(50px,6vw,90px) clamp(24px,6vw,90px); max-width:1440px; margin:0 auto;\">\n    <div style=\"text-align:center;\">\n      <div data-words=\"1\" style=\"font-family:'Great Vibes',cursive; font-size:clamp(2.8rem,4.5vw,4rem); color:#efdcb4; line-height:1.1;\">In every soul, a light<\u002Fdiv>\n      <div data-blur=\"0.2\" style=\"font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:.3em; color:#8f7f61; margin-top:12px;\">CHARACTER POSTERS<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; flex-wrap:wrap; justify-content:center; align-items:flex-end; gap:clamp(1.4rem,3vw,2.8rem); margin-top:clamp(2.4rem,4vw,3.6rem);\">\n      <div data-card=\"0\" style=\"flex:0 1 320px; min-width:min(100%,230px); transform:rotate(-2deg); transition:transform .7s cubic-bezier(.2,.6,.2,1);\" style-hover=\"transform:rotate(-1deg) translateY(-14px) scale(1.03);\">\n        <img src=\"8a912964-8686-463b-99cd-228044867845\" alt=\"Character poster — Tsoomoo, the boy\" style=\"animation:bosFloat 6.5s ease-in-out infinite alternate; display:block; width:100%; box-shadow:0 5px 14px rgba(0,0,0,.5), 0 44px 90px -24px rgba(0,0,0,.8); outline:1px solid rgba(239,220,180,.12);\">\n      <\u002Fdiv>\n      <div data-card=\"0.12\" style=\"flex:0 1 350px; min-width:min(100%,230px); margin-bottom:clamp(1rem,3vw,2.6rem); z-index:1; transition:transform .7s cubic-bezier(.2,.6,.2,1);\" style-hover=\"transform:translateY(-14px) scale(1.03);\">\n        <img src=\"f4227a3c-8714-41ab-8d72-87e2f148213d\" alt=\"Character poster — Balgaa, the father\" style=\"animation:bosFloat 7.8s ease-in-out 1.2s infinite alternate; display:block; width:100%; box-shadow:0 5px 14px rgba(0,0,0,.5), 0 44px 90px -24px rgba(0,0,0,.8); outline:1px solid rgba(239,220,180,.12);\">\n      <\u002Fdiv>\n      <div data-card=\"0.24\" style=\"flex:0 1 320px; min-width:min(100%,230px); transform:rotate(2deg); transition:transform .7s cubic-bezier(.2,.6,.2,1);\" style-hover=\"transform:rotate(1deg) translateY(-14px) scale(1.03);\">\n        <img src=\"1ceda5b9-236a-41c8-8a8e-febbc302a642\" alt=\"Character poster — Tsevelmaa, the mother\" style=\"animation:bosFloat 7.1s ease-in-out .6s infinite alternate; display:block; width:100%; box-shadow:0 5px 14px rgba(0,0,0,.5), 0 44px 90px -24px rgba(0,0,0,.8); outline:1px solid rgba(239,220,180,.12);\">\n      <\u002Fdiv>\n      <div data-card=\"0.1\" style=\"flex:0 1 320px; min-width:min(100%,230px); transform:rotate(2deg); transition:transform .7s cubic-bezier(.2,.6,.2,1);\" style-hover=\"transform:rotate(1deg) translateY(-14px) scale(1.03);\">\n        <img src=\"f3920c02-9c8a-444f-bdb2-e29278cf8985\" alt=\"Character poster — Davaa, the grandmother\" style=\"animation:bosFloat 6.9s ease-in-out .3s infinite alternate; display:block; width:100%; box-shadow:0 5px 14px rgba(0,0,0,.5), 0 44px 90px -24px rgba(0,0,0,.8); outline:1px solid rgba(239,220,180,.12);\">\n      <\u002Fdiv>\n      <div data-card=\"0.22\" style=\"flex:0 1 350px; min-width:min(100%,230px); margin-bottom:clamp(1rem,3vw,2.6rem); z-index:1; transition:transform .7s cubic-bezier(.2,.6,.2,1);\" style-hover=\"transform:translateY(-14px) scale(1.03);\">\n        <img src=\"a4f85d37-7e96-4ce2-a9d1-a0b6dc348daa\" alt=\"Character poster\" style=\"animation:bosFloat 7.5s ease-in-out 1.6s infinite alternate; display:block; width:100%; box-shadow:0 5px 14px rgba(0,0,0,.5), 0 44px 90px -24px rgba(0,0,0,.8); outline:1px solid rgba(239,220,180,.12);\">\n      <\u002Fdiv>\n      <div data-card=\"0.34\" style=\"flex:0 1 320px; min-width:min(100%,230px); transform:rotate(-2deg); transition:transform .7s cubic-bezier(.2,.6,.2,1);\" style-hover=\"transform:rotate(-1deg) translateY(-14px) scale(1.03);\">\n        <img src=\"ce44eb2b-4851-496e-9b77-63bcef053751\" alt=\"Character poster\" style=\"animation:bosFloat 6.7s ease-in-out .9s infinite alternate; display:block; width:100%; box-shadow:0 5px 14px rgba(0,0,0,.5), 0 44px 90px -24px rgba(0,0,0,.8); outline:1px solid rgba(239,220,180,.12);\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p data-blur=\"0.2\" style=\"text-align:center; font-style:italic; font-size:clamp(1.15rem,1.5vw,1.4rem); color:#a89a80; margin:clamp(2rem,3.5vw,3rem) auto 0; max-width:36em;\">A father whose only argument is love. The boy who refuses to leave him. The mother who returns after twenty years. The grandmother whose passing sets everything in motion. And the childhood friends — once child jockeys together — now divided over one boy's fate.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ============ DIRECTOR ============ -->\n  <section data-screen-label=\"Director\" style=\"padding:clamp(50px,6vw,90px) clamp(24px,6vw,90px) clamp(70px,9vw,120px); max-width:1440px; margin:0 auto; display:flex; flex-wrap:wrap; gap:clamp(2.5rem,5vw,5rem); align-items:center;\">\n    <div data-wipe=\"0\" style=\"flex:0 1 440px; min-width:min(100%,300px);\">\n      <img src=\"e92e672a-d06c-4882-9c01-844a8e8ecc6f\" alt=\"The boy comforts his grandmother\" style=\"display:block; width:100%; aspect-ratio:16/9; object-fit:cover; box-shadow:0 24px 60px -16px rgba(0,0,0,.7);\">\n    <\u002Fdiv>\n    <div style=\"flex:1 1 440px; min-width:min(100%,320px);\">\n      <div data-words=\"1\" style=\"font-family:'Great Vibes',cursive; font-size:clamp(2.8rem,4.5vw,4rem); color:#b3242c; line-height:1.1;\">From the director<\u002Fdiv>\n      <p data-blur=\"0.2\" style=\"font-size:clamp(1.25rem,1.7vw,1.65rem); line-height:1.55; color:#d9c8a6; margin:1.4rem 0 0; font-style:italic; max-width:32em;\">\"As a boy I was a jockey. I rode to win — then my body grew, and the racing ended before I was ready. This film is made from what stayed tethered to me since. Do not weigh a person by the outside. A true parent is not the one who gives birth, but the one who stays.\"<\u002Fp>\n      <div data-blur=\"0.35\" style=\"margin-top:1.6rem; font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:.26em; color:#8f7f61;\">E. BATNYAMBUU — WRITER, DIRECTOR, BALGAA<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CONTACT ============ -->\n  <section data-screen-label=\"Contact\" style=\"padding:0 clamp(24px,6vw,90px) clamp(70px,9vw,120px); max-width:1440px; margin:0 auto;\">\n    <div style=\"border-top:1px solid rgba(233,217,187,.16); padding-top:clamp(50px,6vw,80px); display:flex; flex-wrap:wrap; gap:clamp(2.5rem,5vw,5rem);\">\n      <div style=\"flex:1 1 380px; min-width:min(100%,300px);\">\n        <div data-words=\"1\" style=\"font-family:'Great Vibes',cursive; font-size:clamp(2.8rem,4.5vw,4rem); color:#b3242c; line-height:1.1;\">Get in touch<\u002Fdiv>\n        <p data-blur=\"0.2\" style=\"font-size:clamp(1.25rem,1.6vw,1.55rem); line-height:1.55; color:#d9c8a6; margin:1.4rem 0 0; max-width:26em;\">For distribution, festivals, press and screening enquiries.<\u002Fp>\n        <a data-blur=\"0.3\" href=\"mailto:contact@bondofsoul.com\" style=\"display:inline-block; margin-top:1.6rem; font-family:'Oswald',sans-serif; font-size:15px; letter-spacing:.14em; color:#efdcb4; text-decoration:none; border-bottom:1px solid rgba(239,220,180,.4); padding-bottom:4px; transition:color .4s, border-color .4s;\" style-hover=\"color:#fff; border-color:#b3242c;\">CONTACT@BONDOFSOUL.COM<\u002Fa>\n      <\u002Fdiv>\n      <form data-blur=\"0.25\" action=\"https://formsubmit.co/contact@bondofsoul.com\" method=\"POST\" style=\"flex:1 1 440px; min-width:min(100%,300px); display:flex; flex-direction:column; gap:16px;\">\n        <input type=\"hidden\" name=\"_subject\" value=\"Bond of Soul — website enquiry\">\n        <input type=\"hidden\" name=\"_captcha\" value=\"false\">\n        <div style=\"display:flex; flex-wrap:wrap; gap:16px;\">\n          <input type=\"text\" name=\"name\" required=\"required\" placeholder=\"Your name\" style=\"flex:1 1 200px; padding:16px 18px; background:rgba(239,220,180,.06); border:1px solid rgba(239,220,180,.22); color:#e9d9bb; font-family:'Cormorant Garamond',serif; font-size:18px; outline:none; transition:border-color .4s, background .4s;\" style-focus=\"border-color:rgba(239,220,180,.55); background:rgba(239,220,180,.09);\">\n          <input type=\"email\" name=\"email\" required=\"required\" placeholder=\"Your email\" style=\"flex:1 1 200px; padding:16px 18px; background:rgba(239,220,180,.06); border:1px solid rgba(239,220,180,.22); color:#e9d9bb; font-family:'Cormorant Garamond',serif; font-size:18px; outline:none; transition:border-color .4s, background .4s;\" style-focus=\"border-color:rgba(239,220,180,.55); background:rgba(239,220,180,.09);\">\n        <\u002Fdiv>\n        <textarea name=\"message\" required=\"required\" placeholder=\"Your message\" rows=\"5\" style=\"padding:16px 18px; background:rgba(239,220,180,.06); border:1px solid rgba(239,220,180,.22); color:#e9d9bb; font-family:'Cormorant Garamond',serif; font-size:18px; outline:none; resize:vertical; transition:border-color .4s, background .4s;\" style-focus=\"border-color:rgba(239,220,180,.55); background:rgba(239,220,180,.09);\"><\u002Ftextarea>\n        <button type=\"submit\" style=\"align-self:flex-start; padding:14px 40px; background:#b3242c; border:none; color:#fff; font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:.28em; cursor:pointer; transition:background .4s, transform .4s;\" style-hover=\"background:#c92e37; transform:translateY(-2px);\">SEND MESSAGE<\u002Fbutton>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ BILLING ============ -->\n  <section data-screen-label=\"Billing\" style=\"padding:0 clamp(24px,6vw,90px) clamp(70px,8vw,110px); max-width:1440px; margin:0 auto; text-align:center;\">\n    <div data-blur=\"0\" style=\"border-top:1px solid rgba(233,217,187,.16); padding-top:clamp(40px,5vw,60px); font-family:'Oswald',sans-serif; text-transform:uppercase; color:#bfae8d; font-size:clamp(13px,1.15vw,16px); letter-spacing:.08em; line-height:2.3;\">\n      <span style=\"font-size:11px; letter-spacing:.22em; color:#8f7f61;\">STARRING<\u002Fspan><br>\n      E. BATNYAMBUU · U. URANCHIMEG · M. BYAMBAA<br>\n      B. SHINEBAYAR · B. ANKHBAYAR · U. SODBILEG<br>\n      <span style=\"font-size:11px; letter-spacing:.22em; color:#8f7f61;\">STORY &amp; SCREENPLAY<\u002Fspan> T. BUM-ERDENE &nbsp; <span style=\"font-size:11px; letter-spacing:.22em; color:#8f7f61;\">CINEMATOGRAPHY<\u002Fspan> B. UNDRAKHBAYAR<br>\n      <span style=\"font-size:11px; letter-spacing:.22em; color:#8f7f61;\">EDITOR<\u002Fspan> N. ASBAYAR &nbsp; <span style=\"font-size:11px; letter-spacing:.22em; color:#8f7f61;\">MUSIC<\u002Fspan> M. BIRVAA &nbsp; <span style=\"font-size:11px; letter-spacing:.22em; color:#8f7f61;\">PRODUCERS<\u002Fspan> E. YANJINLKHAM · YA. BULGAN<br>\n      <span style=\"font-size:11px; letter-spacing:.22em; color:#8f7f61;\">DIRECTED BY<\u002Fspan> E. BATNYAMBUU\n    <\u002Fdiv>\n    <div data-blur=\"0.15\" style=\"margin-top:clamp(40px,5vw,64px); font-family:'Great Vibes',cursive; font-size:clamp(3rem,5vw,4rem); color:#efdcb4;\">Bond of <span style=\"color:#b3242c;\">Soul<\u002Fspan><\u002Fdiv>\n    <div data-blur=\"0.3\" style=\"font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:.26em; color:#8f7f61; margin-top:8px;\">СЭТГЭЛИЙН УЯА · KHUVSAL PRODUCTION · VOO · 2026<\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;filmGrain&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Cinematic effects&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { trailerOpen: false };\n\n  renderVals() {\n    const dust = [];\n    for (let i = 0; i < 14; i++) {\n      const r = (n) => { const x = Math.sin(i * 127.1 + n * 311.7) * 43758.5453; return x - Math.floor(x); };\n      dust.push({\n        left: Math.round(r(1) * 96 + 2),\n        size: (r(2) * 3 + 1.5).toFixed(1),\n        blur: (r(3) * 1.5 + 0.5).toFixed(1),\n        dur: (r(4) * 14 + 12).toFixed(1),\n        delay: (r(5) * 16).toFixed(1)\n      });\n    }\n    const embers = [];\n    for (let i = 0; i < 10; i++) {\n      const r = (n) => { const x = Math.sin(i * 91.7 + n * 217.3) * 43758.5453; return x - Math.floor(x); };\n      embers.push({\n        left: Math.round(r(1) * 96 + 2),\n        size: (r(2) * 2.2 + 1.2).toFixed(1),\n        blur: (r(3) * 1.2 + 0.4).toFixed(1),\n        dur: (r(4) * 16 + 22).toFixed(1),\n        delay: (r(5) * 24).toFixed(1)\n      });\n    }\n    return {\n      dust,\n      embers,\n      showGrain: this.props.filmGrain ?? true,\n      trailerOpen: this.state.trailerOpen,\n      openTrailer: () => this.setState({ trailerOpen: true }),\n      closeTrailer: () => this.setState({ trailerOpen: false })\n    };\n  }\n\n  componentDidMount() {\n    const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    const EASE = 'cubic-bezier(.2,.7,.2,1)';\n\n    if (!reduced) {\n      // --- Word-by-word masked reveal for headings ---\n      document.querySelectorAll('[data-words]').forEach((el) => {\n        const words = el.textContent.trim().split(/\\s+/);\n        el.textContent = '';\n        words.forEach((w, i) => {\n          const mask = document.createElement('span');\n          mask.style.cssText = 'display:inline-block; overflow:hidden; vertical-align:bottom; padding-bottom:.12em; margin-bottom:-.12em;';\n          const inner = document.createElement('span');\n          inner.textContent = w;\n          inner.style.cssText = 'display:inline-block; transform:translateY(120%); transition:transform 1.1s ' + EASE + ' ' + (i * 0.12) + 's;';\n          mask.appendChild(inner);\n          el.appendChild(mask);\n          if (i < words.length - 1) el.appendChild(document.createTextNode('\\u00a0'));\n        });\n      });\n\n      // --- Blur-fade reveals ---\n      document.querySelectorAll('[data-blur]').forEach((el) => {\n        const d = parseFloat(el.getAttribute('data-blur')) || 0;\n        el.style.opacity = '0';\n        el.style.transform = (el.style.transform || '') + ' translateY(28px)';\n        el.style.transition = 'opacity 1.3s ' + EASE + ' ' + d + 's, transform 1.3s ' + EASE + ' ' + d + 's';\n      });\n\n      // --- Image wipe reveals ---\n      document.querySelectorAll('[data-wipe]').forEach((el) => {\n        const d = parseFloat(el.getAttribute('data-wipe')) || 0;\n        el.style.clipPath = 'inset(0 100% 0 0)';\n        el.style.transition = 'clip-path 1.5s cubic-bezier(.65,0,.2,1) ' + d + 's';\n        const img = el.querySelector('img');\n        if (img) {\n          img.style.transform = 'scale(1.18)';\n          img.style.transition = 'transform 2.2s ' + EASE + ' ' + d + 's';\n        }\n      });\n\n      // --- Character cards: rise + settle ---\n      document.querySelectorAll('[data-card]').forEach((el) => {\n        const d = parseFloat(el.getAttribute('data-card')) || 0;\n        el.style.opacity = '0';\n        const base = el.style.transform || '';\n        el.dataset.baseTransform = base;\n        el.style.transform = base + ' translateY(70px)';\n        el.style.transition = 'opacity 1.2s ' + EASE + ' ' + d + 's, transform 1.2s ' + EASE + ' ' + d + 's';\n      });\n\n      this._pending = new Set(document.querySelectorAll('[data-words],[data-blur],[data-wipe],[data-card]'));\n      this._reveal = (el) => {\n        if (el.hasAttribute('data-words')) {\n          el.querySelectorAll('span > span').forEach((s) => { s.style.transform = 'translateY(0)'; });\n        } else if (el.hasAttribute('data-card')) {\n          el.style.opacity = '1';\n          el.style.transform = el.dataset.baseTransform;\n          setTimeout(() => { el.style.transition = 'transform .7s ' + EASE; }, 1600);\n        } else if (el.hasAttribute('data-wipe')) {\n          el.style.clipPath = 'inset(0 0 0 0)';\n          const img = el.querySelector('img');\n          if (img) img.style.transform = 'scale(1)';\n        } else {\n          el.style.opacity = '1';\n          el.style.transform = (el.dataset.baseTransform || '');\n        }\n      };\n      // Absolute safety net: nothing stays hidden longer than 6s\n      this._failsafe = setTimeout(() => {\n        this._pending.forEach((el) => this._reveal(el));\n        this._pending.clear();\n      }, 6000);\n    }\n\n    // --- Scroll-driven scenes ---\n    const clamp01 = (v) => Math.max(0, Math.min(1, v));\n    this._onScroll = () => {\n      if (this._raf) return;\n      this._raf = requestAnimationFrame(() => {\n        this._raf = null;\n        const vh = window.innerHeight;\n\n        // viewport-entry reveals\n        if (this._pending && this._pending.size) {\n          this._pending.forEach((el) => {\n            const r = el.getBoundingClientRect();\n            if (r.top < vh * 0.94 && r.bottom > 0) {\n              this._reveal(el);\n              this._pending.delete(el);\n            }\n          });\n        }\n\n        // progress bar\n        const bar = document.querySelector('[data-progressbar]');\n        if (bar) {\n          const doc = document.documentElement;\n          const p = clamp01(doc.scrollTop / Math.max(1, doc.scrollHeight - vh));\n          bar.style.transform = 'scaleX(' + p.toFixed(4) + ')';\n        }\n        if (reduced) return;\n\n        // quote zoom\n        const q = document.querySelector('[data-zoomquote]');\n        if (q) {\n          const r = q.getBoundingClientRect();\n          const p = clamp01(-r.top / Math.max(1, r.height - vh));\n          const inner = q.querySelector('[data-zoomquote-inner]');\n          if (inner) {\n            const vis = clamp01(p / 0.35) * clamp01((1 - p) / 0.25);\n            inner.style.opacity = vis.toFixed(3);\n            inner.style.transform = 'scale(' + (0.82 + p * 0.35).toFixed(3) + ')';\n          }\n        }\n      });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    window.addEventListener('resize', this._onScroll, { passive: true });\n    this._onScroll();\n\n    // Close trailer on Escape / when leaving fullscreen\n    this._onKey = (e) => { if (e.key === 'Escape' && this.state.trailerOpen) this.setState({ trailerOpen: false }); };\n    this._onFs = () => { if (!document.fullscreenElement && this.state.trailerOpen) this.setState({ trailerOpen: false }); };\n    window.addEventListener('keydown', this._onKey);\n    document.addEventListener('fullscreenchange', this._onFs);\n  }\n\n  componentWillUnmount() {\n    if (this._failsafe) clearTimeout(this._failsafe);\n    if (this._raf) cancelAnimationFrame(this._raf);\n    window.removeEventListener('scroll', this._onScroll);\n    window.removeEventListener('resize', this._onScroll);\n    window.removeEventListener('keydown', this._onKey);\n    document.removeEventListener('fullscreenchange', this._onFs);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
